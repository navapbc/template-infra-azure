name: Feature Request
description: Suggest an idea for this project
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out a feature request!
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: textarea
    id: problem_statement
    attributes:
      label: Is your feature request related to a problem? Please describe
      description: A clear and concise description of what the problem is.
    validations:
      required: false
  - type: textarea
    id: desired_behavior
    attributes:
      label: A clear and concise description of what you want to happen
      description: Help us understand your improvement ideas.
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Priority
      description: How impactful would this be for your project?
      multiple: false
      options:
        - "My project needs this now"
        - "I anticipate needing this soon"
        - "Nice to have"
        - "Just want to discuss"
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/navapbc/template-infra-azure/blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
